<!DOCTYPE html>
<html lang="en">
<head>
    <title>People Analytics Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .header {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(135deg, #1a3c5e, #2d6a9f);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-icon {
            font-size: 2.2rem;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-text h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.3px; }
        .header-text p { font-size: 0.85rem; opacity: 0.8; margin-top: 2px; }

        .nav-links { display: flex; gap: 0.5rem; }

        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255,255,255,0.15);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            white-space: nowrap;
        }
        .nav-link:hover { background: rgba(255,255,255,0.25); }

        .filter-bar {
            width: 100%;
            max-width: 900px;
            background: white;
            border: 1px solid #c9d8e8;
            border-radius: 16px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.25rem;
            display: flex;
            gap: 1.25rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-field label {
            display: block;
            font-size: 0.72rem;
            color: #64748b;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .filter-field select, .filter-field input {
            font-size: 0.85rem;
            padding: 0.45rem 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
        }

        .filter-actions { display: flex; gap: 0.5rem; margin-left: auto; }

        button.filter-btn {
            background: linear-gradient(135deg, #1a3c5e, #2d6a9f);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0.55rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        button.filter-btn.secondary {
            background: #e8f0f7;
            color: #1a3c5e;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .grid {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .card {
            background: white;
            border: 1px solid #c9d8e8;
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            grid-column: span 1;
        }

        .card.full { grid-column: span 2; }

        .card h2 {
            font-size: 0.95rem;
            color: #1a3c5e;
            margin-bottom: 0.75rem;
        }

        .insight {
            font-size: 0.8rem;
            color: #475569;
            margin-top: 0.75rem;
            padding-top: 0.6rem;
            border-top: 1px solid #e2e8f0;
        }

        .insight strong { color: #1a3c5e; }

        canvas { max-height: 280px; }

        @media (max-width: 700px) {
            .grid { grid-template-columns: 1fr; }
            .card.full { grid-column: span 1; }
            .filter-actions { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="header-icon">📊</div>
            <div class="header-text">
                <h1>People Analytics Dashboard</h1>
                <p>Headcount, attrition &amp; hiring source — real HR dataset</p>
            </div>
        </div>
        <div class="nav-links">
            <a class="nav-link" href="/static/index.html">💬 Chat</a>
            <a class="nav-link" href="/static/ask.html">🤖 Ask AI</a>
        </div>
    </div>

    <div class="filter-bar">
        <div class="filter-field">
            <label>Department</label>
            <select id="filterDepartment"><option value="">All</option></select>
        </div>
        <div class="filter-field">
            <label>Recruitment Source</label>
            <select id="filterSource"><option value="">All</option></select>
        </div>
        <div class="filter-field">
            <label>Hired From</label>
            <input type="date" id="filterFrom">
        </div>
        <div class="filter-field">
            <label>Hired To</label>
            <input type="date" id="filterTo">
        </div>
        <div class="filter-actions">
            <button class="filter-btn secondary" id="resetFiltersBtn" type="button">Reset</button>
            <button class="filter-btn" id="applyFiltersBtn" type="button">Apply Filters</button>
        </div>
    </div>

    <div class="grid">
        <div class="card full">
            <h2>Headcount Over Time</h2>
            <canvas id="headcountChart"></canvas>
            <div class="insight" id="headcountInsight"></div>
        </div>

        <div class="card">
            <h2>Attrition Rate by Department</h2>
            <canvas id="attritionChart"></canvas>
            <div class="insight" id="attritionInsight"></div>
        </div>

        <div class="card">
            <h2>Hires by Recruitment Source</h2>
            <canvas id="sourceChart"></canvas>
            <div class="insight" id="sourceInsight"></div>
        </div>
    </div>

    <script>
        const palette = ['#2d6a9f', '#4ade80', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'];
        const charts = {}; // canvasId -> Chart instance, so filters can re-render safely

        function renderChart(canvasId, config) {
            if (charts[canvasId]) charts[canvasId].destroy();
            charts[canvasId] = new Chart(document.getElementById(canvasId), config);
        }

        function currentFilters() {
            const params = new URLSearchParams();
            const department = document.getElementById('filterDepartment').value;
            const source = document.getElementById('filterSource').value;
            const from = document.getElementById('filterFrom').value;
            const to = document.getElementById('filterTo').value;
            if (department) params.set('department', department);
            if (source) params.set('recruitment_source', source);
            if (from) params.set('date_from', from);
            if (to) params.set('date_to', to);
            const qs = params.toString();
            return qs ? `?${qs}` : '';
        }

        async function loadFilterOptions() {
            const res = await fetch('/api/dashboard/filter-options');
            const data = await res.json();

            const depSelect = document.getElementById('filterDepartment');
            data.departments.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d;
                depSelect.appendChild(opt);
            });

            const sourceSelect = document.getElementById('filterSource');
            data.recruitment_sources.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                sourceSelect.appendChild(opt);
            });

            if (data.date_of_hire_min) {
                document.getElementById('filterFrom').min = data.date_of_hire_min;
                document.getElementById('filterTo').min = data.date_of_hire_min;
            }
            if (data.date_of_hire_max) {
                document.getElementById('filterFrom').max = data.date_of_hire_max;
                document.getElementById('filterTo').max = data.date_of_hire_max;
            }
        }

        async function loadHeadcount() {
            const res = await fetch('/api/dashboard/headcount' + currentFilters());
            const data = await res.json();
            const insightEl = document.getElementById('headcountInsight');

            if (!data.headcount.length) {
                renderChart('headcountChart', { type: 'line', data: { labels: [], datasets: [] } });
                insightEl.innerHTML = '<strong>Insight:</strong> No employees match the current filters.';
                return;
            }

            renderChart('headcountChart', {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Active Headcount',
                        data: data.headcount,
                        borderColor: '#2d6a9f',
                        backgroundColor: 'rgba(45,106,159,0.1)',
                        fill: true,
                        tension: 0.25,
                        pointRadius: 0,
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });

            const first = data.headcount[0];
            const last = data.headcount[data.headcount.length - 1];
            const direction = last >= first ? 'grew' : 'declined';
            insightEl.innerHTML =
                `<strong>Insight:</strong> Headcount ${direction} from ${first} to ${last} employees over the observed period.`;
        }

        async function loadAttrition() {
            const res = await fetch('/api/dashboard/attrition' + currentFilters());
            const data = await res.json();
            const insightEl = document.getElementById('attritionInsight');

            if (!data.departments.length) {
                renderChart('attritionChart', { type: 'bar', data: { labels: [], datasets: [] } });
                insightEl.innerHTML = '<strong>Insight:</strong> No employees match the current filters.';
                return;
            }

            renderChart('attritionChart', {
                type: 'bar',
                data: {
                    labels: data.departments.map(d => d.department),
                    datasets: [{
                        label: 'Attrition Rate (%)',
                        data: data.departments.map(d => d.attrition_rate),
                        backgroundColor: palette,
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });

            const worst = data.departments[0];
            insightEl.innerHTML =
                `<strong>Insight:</strong> ${worst.department} has the highest attrition rate at ${worst.attrition_rate}%.`;
        }

        async function loadSource() {
            const res = await fetch('/api/dashboard/recruitment-source' + currentFilters());
            const data = await res.json();
            const insightEl = document.getElementById('sourceInsight');

            if (!data.sources.length) {
                renderChart('sourceChart', { type: 'bar', data: { labels: [], datasets: [] } });
                insightEl.innerHTML = '<strong>Insight:</strong> No employees match the current filters.';
                return;
            }

            renderChart('sourceChart', {
                type: 'bar',
                data: {
                    labels: data.sources.map(s => s.recruitment_source),
                    datasets: [{
                        label: 'Hires',
                        data: data.sources.map(s => s.hires),
                        backgroundColor: palette,
                    }]
                },
                options: { indexAxis: 'y', plugins: { legend: { display: false } } }
            });

            const top = data.sources[0];
            insightEl.innerHTML =
                `<strong>Insight:</strong> ${top.recruitment_source} is the top hiring source, with ${top.hires} hires.`;
        }

        function loadAllCharts() {
            loadHeadcount();
            loadAttrition();
            loadSource();
        }

        document.getElementById('applyFiltersBtn').addEventListener('click', loadAllCharts);
        document.getElementById('resetFiltersBtn').addEventListener('click', () => {
            document.getElementById('filterDepartment').value = '';
            document.getElementById('filterSource').value = '';
            document.getElementById('filterFrom').value = '';
            document.getElementById('filterTo').value = '';
            loadAllCharts();
        });

        loadFilterOptions();
        loadAllCharts();
    </script>
</body>
</html>
