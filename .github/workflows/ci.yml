name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked

      # Only the credential-free unit tests run in CI. eval.py needs a live
      # Vertex AI call, which would require storing GCP credentials as a
      # GitHub secret -- not worth the exposure/cost risk for a public repo.
      # Run `uv run python eval.py` locally before merging LLM-behavior changes.
      - name: Run unit tests
        run: uv run pytest -v
